# SITE CONFIGURATION
title: "Self Evidence"
description: Self Evidence is a platform for cleaning and analyzing publicly available data.
baseurl: "" # for user.github.io root, leave empty
url: "https://selfevidence.github.io" # your GitHub Pages URL

# # SEO PLUGIN
# social:
#   name: Your Name
#   links:
#     - https://twitter.com/BenBalter
#     - https://www.facebook.com/ben.balter
#     - https://www.linkedin.com/in/BenBalter
#     - https://plus.google.com/+BenBalter
