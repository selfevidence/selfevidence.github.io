#     - https://keybase.io/benbalter

# THEME SETTINGS
navigation: # Navigation links
  - {name: 'Home', link: '/'}
  - {name: 'Articles', link: '/articles'}
  - {name: 'Data', link: '/data'}
  - {name: 'About', link: '/about'}
  # - {name: 'Contact', link: '/contact'}

tagline: >
  We hold this (publicly available, transparently analyzed) data to be self-evident.

hero_img: posts/self-evidence-hero.jpg # Main background image: use the path from /assets/img/ => This will output /assets/img/posts/sleek_lg.jpg

email: abode118@gmail.com # email for form submission

github_username:  selfevidence # replace with your_github_username or comment to remove link from footer

# google_tag_manager: GTM-XXXXXXX # Uncomment to enable GTM. Replace GTM-XXXXXXX with your GTM container ID

# service_worker: true

# BUILD SETTINGS
markdown: kramdown
highlighter: rouge # or pygments or null

# Optional: exclude things from being processed
exclude:
  - README.md
  - node_modules
  - script
  - package.json
  - package-lock.json
  - Gemfile
  - Gemfile.lock
  - vendor
  - npm-debug.log
  - gulpfile.js
  - sleek.jpg

include: ['_pages']
permalink: /:title/

compress_html:
  clippings: all

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  